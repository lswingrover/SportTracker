name: Validate

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  validate-names:
    name: Validate package names
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Check all workspace package names start with a letter
        run: |
          node -e "
            const fs = require('fs');
            const path = require('path');
            const apps = fs.readdirSync('apps');
            const errors = [];
            for (const app of apps) {
              const pkgPath = path.join('apps', app, 'package.json');
              if (!fs.existsSync(pkgPath)) continue;
              const { name } = JSON.parse(fs.readFileSync(pkgPath, 'utf8'));
              if (!/^[a-zA-Z]/.test(name)) errors.push(app + ': ' + name);
            }
            if (errors.length) { console.error('Bad names: ' + errors.join(', ')); process.exit(1); }
            console.log('All package names valid.');
          "

  build:
    name: Build
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        app: [volleywatch, narwhaltracker]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
      - name: Install dependencies
        run: npm ci
      - name: Build ${{ matrix.app }}
        working-directory: apps/${{ matrix.app }}
        env:
          NEXT_PUBLIC_VAPID_PUBLIC_KEY: CI_PLACEHOLDER
          EVENT_ID: '0'
          DIVISION_ID: '0'
          TEAM_ID: '0'
          TEAM_NAME: CI
        run: npm run build
